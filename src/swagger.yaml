openapi: 3.0.3
info:
  title: Dental Clinic API
  version: 1.0.0
  description: REST API for the Dental Clinic website with Super Admin CMS.

servers:
  - url: /
    description: Same host as Swagger UI

tags:
  - name: Auth
  - name: Blogs
  - name: Appointments
  - name: Contact
  - name: Testimonials
  - name: Services
  - name: Settings
  - name: FAQs
  - name: Dashboard
  - name: Schedule
  - name: Health
  - name: Banners
  - name: Subscriptions
  - name: Users
  - name: Headers

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  uptime:
                    type: number

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login to account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Invalid credentials
        '403':
          description: User not verified

  /api/auth/login/verify:
    post:
      tags: [Auth]
      summary: Verify login OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: Verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid or expired OTP
        '404':
          description: User not found

  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Created
        '400':
          description: Validation error or conflict

  /api/auth/signup/verify:
    post:
      tags: [Auth]
      summary: Verify signup OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: Verified successfully
        '400':
          description: Invalid or expired OTP
        '404':
          description: User not found


  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: OTP sent
        '404':
          description: User not found

  /api/auth/forgot-password/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyForgotPasswordRequest'
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired OTP
        '404':
          description: User not found

  /api/blogs:
    get:
      tags: [Blogs]
      summary: List all blogs (requires auth)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Blog list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Blog'

  /api/blogs/{slug}:
    get:
      tags: [Blogs]
      summary: Get blog by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Blog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blog'
        '404':
          description: Not found

  /api/blogs/admin:
    post:
      tags: [Blogs]
      summary: Create blog (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blog'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/blogs/admin/{id}:
    put:
      tags: [Blogs]
      summary: Update blog (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blog'
        '404':
          description: Not found

  /api/blog-categories:
    get:
      tags: [Blogs]
      summary: List blog categories (public)
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogCategory'
    post:
      tags: [Blogs]
      summary: Create blog category (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogCategoryCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogCategory'
        '400':
          description: Validation error or conflict
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/blog-categories/{id}:
    put:
      tags: [Blogs]
      summary: Update blog category (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogCategoryUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogCategory'
        '404':
          description: Not found
    delete:
      tags: [Blogs]
      summary: Delete blog category (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found
    delete:
      tags: [Blogs]
      summary: Delete blog (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/appointments:
    post:
      tags: [Appointments]
      summary: Create appointment (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          description: Validation error

  /api/appointments/admin:
    get:
      tags: [Appointments]
      summary: List appointments (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: Appointment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/appointments/admin/{id}:
    put:
      tags: [Appointments]
      summary: Update appointment status (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentStatusUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '404':
          description: Not found
    delete:
      tags: [Appointments]
      summary: Delete appointment (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/contact:
    post:
      tags: [Contact]
      summary: Submit contact message (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'

  /api/contact/admin:
    get:
      tags: [Contact]
      summary: List contact messages (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contact message list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contact'

  /api/contact/admin/{id}/reply:
    post:
      tags: [Contact]
      summary: Reply to contact message (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactReply'
      responses:
        '200':
          description: Reply sent
        '404':
          description: Not found

  /api/contact/admin/{id}:
    delete:
      tags: [Contact]
      summary: Delete contact message (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/testimonials:
    get:
      tags: [Testimonials]
      summary: List approved testimonials (public)
      responses:
        '200':
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Testimonial'
    post:
      tags: [Testimonials]
      summary: Create testimonial (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestimonialCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Testimonial'

  /api/testimonials/admin:
    get:
      tags: [Testimonials]
      summary: List all testimonials (admin)
      description: Returns both approved and unapproved testimonials.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Testimonial'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/testimonials/admin/{id}:
    put:
      tags: [Testimonials]
      summary: Update testimonial (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestimonialUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Testimonial'
        '404':
          description: Not found
    delete:
      tags: [Testimonials]
      summary: Delete testimonial (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/services:
    get:
      tags: [Services]
      summary: List active services (public)
      responses:
        '200':
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'

  /api/services/admin:
    post:
      tags: [Services]
      summary: Create service (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'

  /api/services/admin/{id}:
    put:
      tags: [Services]
      summary: Update service (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          description: Not found
    delete:
      tags: [Services]
      summary: Delete service (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/faqs:
    get:
      tags: [FAQs]
      summary: List FAQs (public)
      responses:
        '200':
          description: FAQ list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Faq'

  /api/faqs/admin:
    get:
      tags: [FAQs]
      summary: List FAQs (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: FAQ list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Faq'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      tags: [FAQs]
      summary: Create FAQ (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaqCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faq'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/faqs/admin/{id}:
    put:
      tags: [FAQs]
      summary: Update FAQ (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaqUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faq'
        '404':
          description: Not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      tags: [FAQs]
      summary: Delete FAQ (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found
        '401':
          description: Unauthorized

  /api/headers:
    get:
      tags: [Headers]
      summary: Get all header details (public)
      responses:
        '200':
          description: Header details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Header'
    post:
      tags: [Headers]
      summary: Create header details (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Header'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Header'

  /api/headers/{id}:
    put:
      tags: [Headers]
      summary: Update header details (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Header'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Header'
        '404':
          description: Not found
    delete:
      tags: [Headers]
      summary: Delete header details (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/settings:
    get:
      tags: [Settings]
      summary: Get public site settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'

  /api/settings/admin:
    put:
      tags: [Settings]
      summary: Upsert site settings (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteSettings'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'

  /api/dashboard/admin:
    get:
      tags: [Dashboard]
      summary: Get dashboard counts (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardCounts'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/schedule/availability:
    post:
      tags: [Schedule]
      summary: Set doctor weekly availability (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorAvailabilityCreate'
      responses:
        '201':
          description: Saved availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorAvailability'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/schedule/break:
    post:
      tags: [Schedule]
      summary: Add recurring break time (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorBreakCreate'
      responses:
        '201':
          description: Created break
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorBreak'
        '409':
          description: Break already exists
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/schedule/block:
    post:
      tags: [Schedule]
      summary: Block date-specific slot range (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockedSlotCreate'
      responses:
        '201':
          description: Created block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedSlot'
        '409':
          description: Block already exists
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/schedule/slots:
    get:
      tags: [Schedule]
      summary: Get available slots for a date (public)
      parameters:
        - in: query
          name: doctor_id
          required: true
          schema:
            type: string
        - in: query
          name: date
          required: true
          schema:
            type: string
            example: '2026-03-20'
      responses:
        '200':
          description: Slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeneratedSlot'
        '400':
          description: Validation error

  /api/schedule/slots-by-date:
    get:
      tags: [Schedule]
      summary: Get available slots for a date (public, default doctor)
      description: Uses server-configured PUBLIC_DOCTOR_ID (or first admin) to generate slots.
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            example: '2026-03-20'
      responses:
        '200':
          description: Slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeneratedSlot'
        '400':
          description: Validation error
        '404':
          description: No doctor configured

  /api/banners:
    get:
      tags: [Banners]
      summary: List active banners (public)
      responses:
        '200':
          description: Banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Banner'

  /api/banners/admin:
    get:
      tags: [Banners]
      summary: List all banners (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Banner'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      tags: [Banners]
      summary: Create banner (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BannerCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Banner'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/banners/admin/{id}:
    put:
      tags: [Banners]
      summary: Update banner (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BannerUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Banner'
        '404':
          description: Not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      tags: [Banners]
      summary: Delete banner (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/subscriptions:
    post:
      tags: [Subscriptions]
      summary: Subscribe email (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '201':
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscribeResponse'
        '400':
          description: Validation error

  /api/subscriptions/admin:
    get:
      tags: [Subscriptions]
      summary: List subscriptions (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
        - in: query
          name: status
          schema:
            type: string
            enum: [subscribed, unsubscribed, all]
            default: subscribed
        - in: query
          name: q
          description: Search by email (contains)
          schema:
            type: string
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/subscriptions/admin/send:
    post:
      tags: [Subscriptions]
      summary: Send bulk email to subscribers (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkEmailRequest'
      responses:
        '200':
          description: Bulk email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkEmailResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/users:
    get:
      tags: [Users]
      summary: List verified users (public)
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicUser'

